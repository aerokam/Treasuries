name: Get Yields FedInvest

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 16 * * 1-5'   # primary: noon EDT / 1:00 PM EST  (fires ~1 PM EDT due to GH lag)
    - cron: '0 17 * * 1-5'   # fallback: 1:00 PM EDT / 2:00 PM EST (fires ~2 PM EDT due to GH lag)
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Get FedInvest yields
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET: ${{ secrets.R2_BUCKET }}
        run: node scripts/getYieldsFedInvest.js
