name: Check EOD Prices

# Runs every 15 min during 10pm to 1am ET window (Mon-Fri) to detect when
# FedInvest publishes end-of-day prices on the historical endpoint.
# Check logs to find the exact publish time, then this workflow can be deleted.

on:
  schedule:
    - cron: '*/15 3-6 * * 2-6'   # 8:00-10:45pm ET (covers both EDT UTC-4 and EST UTC-5)
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Check EOD prices
        run: node fetchFedInvestHistoricalPrices.js

      - name: Upload status to R2
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: npx wrangler r2 object put data/TIPS/eod-status.html --file data/eod-status.html --content-type text/html --remote
