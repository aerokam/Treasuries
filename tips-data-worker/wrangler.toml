name = "tips-data-worker"
main = "src/index.js"
compatibility_date = "2025-01-01"

# R2 bucket binding — bucket name must match exactly as it appears in your Cloudflare dashboard
[[r2_buckets]]
binding = "R2"
bucket_name = "data"

# Cron triggers
# TipsRef:   every Monday 14:00 UTC (10am ET)
# RefCPI:    12th of each month 15:00 UTC
# TipsYields: 1:00 and 1:05pm ET, covering both EDT (UTC-4) and EST (UTC-5)
[triggers]
crons = [
  "0 14 * * 1",
  "0 15 12 * *",
  "0 18 * * 1-5"
]
