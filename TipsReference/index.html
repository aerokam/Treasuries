<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>TIPS Reference - Treasury Investors Portal</title>
<link rel="stylesheet" href="../shared/src/portal-theme.css">
<style>
  body { font-size: 13px; padding: 0; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

  /* ── Header ── */
  header { padding: 9px 14px; background: var(--portal-card-bg); color: var(--portal-card-text); border-bottom: 1px solid var(--portal-header-bg); display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
  header h1 { font-size: 17px; margin: 0; color: var(--portal-card-text); }
  #header-meta { display: none; gap: 18px; }
  .meta-item { display: flex; flex-direction: column; }
  .meta-label { font-size: 9px; font-weight: 800; text-transform: uppercase; letter-spacing: 0.06em; color: var(--tab-inactive-text); opacity: 0.7; }
  .meta-val { font-size: 12px; font-weight: 700; color: var(--portal-card-text); font-variant-numeric: tabular-nums; }
  .meta-date-input { font-size: 12px; font-weight: 700; color: var(--portal-card-text); font-variant-numeric: tabular-nums; background: transparent; border: none; border-bottom: 1px solid var(--border-light, #e2e8f0); padding: 0; outline: none; cursor: pointer; width: 108px; }
  #status { font-size: 11px; color: var(--tab-inactive-text); font-style: italic; margin-left: auto; }
  #status.error { color: #f87171; font-style: normal; font-weight: 600; }
  .btn { padding: 4px 10px; font-size: 11px; }
  .btn:hover:not(:disabled) { transform: none; box-shadow: none; }

  /* ── Row count bar ── */
  #row-count { font-size: 11px; color: var(--portal-text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.04em; padding: 5px 14px; border-bottom: 1px solid #f1f5f9; background: #fff; flex-shrink: 0; display: none; }

  /* ── Table wrap ── */
  .table-wrap { flex: 1; overflow: auto; min-height: 0; background: #fff; }

  /* ── Table ── */
  table { border-collapse: separate; border-spacing: 0; font-size: 11px; width: fit-content; background: #fff; }

  thead th, thead td {
    position: sticky;
    z-index: 20;
    background-clip: padding-box;
  }

  /* Row 1 — sortable headers */
  thead tr:first-child th {
    top: 0;
    z-index: 22;
    background: var(--portal-text-main);
    color: var(--portal-text-on-dark);
    padding: 5px 8px;
    text-align: right;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    white-space: nowrap;
    border-bottom: 1px solid var(--portal-header-bg);
  }
  thead tr:first-child th.wrap-header { white-space: normal; min-width: 64px; }
  thead tr:first-child th.left { text-align: left; }
  thead tr:first-child th:hover { background: #2d3f57; }
  thead th.sort-asc::after  { content: ' \2191'; }
  thead th.sort-desc::after { content: ' \2193'; }

  /* Row 2 — filter inputs */
  thead tr.filter-row td {
    top: 29px; /* adjusted by JS after render */
    z-index: 21;
    background: #f1f5f9;
    padding: 2px 4px;
    border-bottom: 2px solid var(--border-light);
  }

  .filter-input { display: block; width: 100%; padding: 2px 5px; font-size: 11px; border: 1px solid var(--border-light); border-radius: 3px; outline: none; background: #fff; min-width: 40px; box-sizing: border-box; }
  .filter-input:focus { border-color: #1a56db; }
  .filter-input.active { border-color: #f59e0b; background: #fffbeb; }

  /* ── Clickable coupon cells ── */
  td.cpn-clickable { cursor: pointer; color: #1a56db; }
  td.cpn-clickable:hover { background: #eff6ff !important; text-decoration: underline; }

  /* ── Coupon calc modal ── */
  #cpn-modal { display: none; position: fixed; inset: 0; z-index: 200; align-items: center; justify-content: center; }
  #cpn-modal.open { display: flex; }
  #cpn-modal-overlay { position: absolute; inset: 0; background: rgba(0,0,0,0.35); }
  #cpn-modal-card { position: relative; background: #fff; border-radius: 6px; padding: 20px 22px 18px; min-width: 340px; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.18); z-index: 1; }
  #cpn-modal-title { font-size: 13px; font-weight: 700; color: var(--portal-text-main); margin-bottom: 14px; padding-right: 24px; }
  #cpn-modal-close { position: absolute; top: 10px; right: 12px; background: none; border: none; font-size: 18px; line-height: 1; cursor: pointer; color: var(--tab-inactive-text); padding: 2px 6px; }
  #cpn-modal-close:hover { color: var(--portal-text-main); }
  .cmt { border-collapse: collapse; width: 100%; font-size: 12px; }
  .cmt .cml { font-weight: 600; color: var(--portal-text-main, #1e293b); padding: 3px 14px 3px 0; white-space: nowrap; vertical-align: top; }
  .cmt .cmv { text-align: right; font-variant-numeric: tabular-nums; padding: 3px 0; }
  .cmt .cms td { padding-top: 2px; border-top: 1px solid #f1f5f9; height: 6px; }
  .cmt .cmf td { padding-top: 4px; font-size: 11px; color: var(--portal-text-main, #1e293b); }
  .cmt .cmr .cml { font-size: 13px; font-weight: 700; color: var(--portal-text-main); }
  .cmt .cmr .cmv { font-size: 13px; font-weight: 700; color: var(--portal-text-main); }

  /* Body rows */
  tbody td { padding: 4px 8px; border-bottom: 1px solid #f1f5f9; font-variant-numeric: tabular-nums; white-space: nowrap; background: #fff; }
  tbody td.right { text-align: right; }
  tbody tr:hover td { background: #fffde7; }
</style>
</head>
<body>

<header>
  <a href="../" class="portal-link">&#8592; Portal</a>
  <h1>TIPS Reference</h1>
  <div id="header-meta">
    <div class="meta-item">
      <span class="meta-label">Price Date</span>
      <span class="meta-val" id="meta-price-date">—</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Settlement</span>
      <span class="meta-val" id="meta-sett-date">—</span>
    </div>
    <div class="meta-item">
      <span class="meta-label">Ref CPI Date</span>
      <input type="date" id="ref-cpi-date-input" class="meta-val meta-date-input">
    </div>
    <div class="meta-item">
      <span class="meta-label">Ref CPI</span>
      <span class="meta-val" id="meta-ref-cpi">—</span>
    </div>
  </div>
  <span id="status" style="margin-left:auto;">Loading…</span>
  <button id="export-btn" class="btn" disabled>Export CSV</button>
</header>

<div id="row-count"></div>

<div class="table-wrap">
  <table>
    <thead>
      <tr id="header-row"></tr>
      <tr class="filter-row" id="filter-row"></tr>
    </thead>
    <tbody id="main-tbody"></tbody>
  </table>
</div>

<div id="cpn-modal">
  <div id="cpn-modal-overlay"></div>
  <div id="cpn-modal-card">
    <button id="cpn-modal-close">&times;</button>
    <div id="cpn-modal-title"></div>
    <div id="cpn-modal-body"></div>
  </div>
</div>

<script>
const R2_ROOT = 'https://pub-ba11062b177640459f72e0a88d0261ae.r2.dev';
const BASE_URL = R2_ROOT + '/Treasuries';
const TIPS_URL = R2_ROOT + '/TIPS';

var allRows = [];
var refCpiRows = [];
var lastRenderedRows = [];
var priceDateStr = '';
var settlementDateStr = '';
var refCpiDateStr = '';
var sortCol = 'maturity';
var sortDir = 'asc';
var filters = {};

var COLS = [
  { key: 'cusip',      label: 'CUSIP',             align: 'left',  sortType: 'str',
    fmt: function(v) { return v != null ? String(v) : ''; } },
  { key: 'maturity',   label: 'Maturity',           align: 'left',  sortType: 'str',
    fmt: function(v) { return v != null ? String(v) : ''; } },
  { key: 'coupon',     label: 'Coupon',             align: 'right', sortType: 'num',
    fmt: function(v) { return v != null ? (v * 100).toFixed(3) + '%' : '—'; } },
  { key: 'datedDate',  label: 'Dated Date',         align: 'left',  sortType: 'str',
    fmt: function(v) { return v != null ? String(v) : ''; } },
  { key: 'baseCpi',    label: 'Dated Date Ref CPI', align: 'right', sortType: 'num', wrapHeader: true,
    fmt: function(v) { return v != null ? v.toFixed(5) : '—'; } },
  { key: 'price',      label: 'Price',              align: 'right', sortType: 'num',
    fmt: function(v) { return v != null ? v.toFixed(3) : '—'; } },
  { key: 'indexRatio', label: 'Index Ratio',        align: 'right', sortType: 'num',
    fmt: function(v) { return v != null ? v.toFixed(5) : '—'; } },
  { key: 'adjPrice',   label: 'Adj Price',          align: 'right', sortType: 'num',
    fmt: function(v) { return v != null ? v.toFixed(3) : '—'; } },
  { key: 'yield',      label: 'Yield',              align: 'right', sortType: 'num',
    fmt: function(v) { return v != null ? (v * 100).toFixed(3) + '%' : '—'; } },
  { key: 'term',        label: 'Term',               align: 'right', sortType: 'num',
    fmt: function(v) { return v != null ? v.toFixed(2) + 'y' : '—'; } },
  { key: 'macDuration', label: 'Mac Duration',        align: 'right', sortType: 'num',
    fmt: function(v) { return v != null ? v.toFixed(2) : '—'; } },
  { key: 'modDuration', label: 'Mod Duration',        align: 'right', sortType: 'num',
    fmt: function(v) { return v != null ? v.toFixed(2) : '—'; } },
  { key: 'nextCoupon',  label: 'Cpn Date',             align: 'left',  sortType: 'str',
    title: 'Coupon payment date on or after the selected Ref CPI Date',
    fmt: function(v) { return v != null ? fmtDate(v) : '—'; } },
  { key: 'cpnPayment',  label: 'Cpn $ / Bond',        align: 'right', sortType: 'num', wrapHeader: true,
    fmt: function(v) { return v != null ? v.toFixed(4) : '—'; } },
];

// Duration helpers — inline copy of shared/src/bond-math.js (must stay in sync)
function _addSemiannualPeriods(date, n, matureDay) {
  var d = new Date(date);
  d.setDate(1);
  d.setMonth(d.getMonth() + n * 6);
  var lastDay = new Date(d.getFullYear(), d.getMonth() + 1, 0).getDate();
  d.setDate(Math.min(matureDay, lastDay));
  return d;
}

function _nextCouponOnOrAfter(settle, mature) {
  var matMon = mature.getMonth() + 1;
  var cm1 = matMon <= 6 ? matMon : matMon - 6;
  var cm2 = cm1 + 6;
  var mDay = mature.getDate();
  var candidates = [];
  for (var y = settle.getFullYear() - 1; y <= settle.getFullYear() + 1; y++) {
    [cm1, cm2].forEach(function(mon) {
      var lastDay = new Date(y, mon, 0).getDate();
      candidates.push(new Date(y, mon - 1, Math.min(mDay, lastDay)));
    });
  }
  candidates.sort(function(a, b) { return a - b; });
  for (var i = 0; i < candidates.length; i++) {
    if (candidates[i] >= settle && candidates[i] <= mature) return candidates[i];
  }
  return null;
}

function calculateDuration(settlement, maturity, coupon, yld) {
  if (settlement >= maturity || yld <= -2) return null;
  var nextCpn = _nextCouponOnOrAfter(settlement, maturity);
  if (!nextCpn) return null;
  var mDay = maturity.getDate();
  var lastCpn = _addSemiannualPeriods(nextCpn, -1, mDay);
  var days = function(a, b) { return (b - a) / 86400000; };
  var E   = days(lastCpn, nextCpn);
  var DSC = days(settlement, nextCpn);
  var w   = DSC / E;
  var coupons = [];
  for (var k = 0; ; k++) {
    var d = _addSemiannualPeriods(nextCpn, k, mDay);
    if (d > maturity) break;
    coupons.push(d);
  }
  var N = coupons.length;
  if (N === 0) return null;
  var semiCpn = coupon / 2 * 1000;
  var r = yld / 2;
  var wSum = 0, pvSum = 0;
  for (var j = 0; j < N; j++) {
    var cf = j === N - 1 ? semiCpn + 1000 : semiCpn;
    var t  = w + j;
    var pv = cf / Math.pow(1 + r, t);
    wSum  += t * pv;
    pvSum += pv;
  }
  return wSum / pvSum / 2;
}

// Observed US Treasury market closure dates (bond market holidays)
var BOND_HOLIDAYS = new Set([
  '2025-01-01','2025-01-20','2025-02-17','2025-04-18','2025-05-26',
  '2025-06-19','2025-07-04','2025-09-01','2025-10-13','2025-11-11',
  '2025-11-27','2025-12-25',
  '2026-01-01','2026-01-19','2026-02-16','2026-04-03','2026-05-25',
  '2026-06-19','2026-07-03','2026-09-07','2026-10-12','2026-11-11',
  '2026-11-26','2026-12-25',
  '2027-01-01','2027-01-18','2027-02-15','2027-03-26','2027-05-31',
  '2027-06-18','2027-07-05','2027-09-06','2027-10-11','2027-11-11',
  '2027-11-25','2027-12-24',
]);

function nextTreasuryBusinessDay(isoStr) {
  var d = new Date(isoStr + 'T12:00:00Z');
  do {
    d.setUTCDate(d.getUTCDate() + 1);
  } while (d.getUTCDay() === 0 || d.getUTCDay() === 6 ||
           BOND_HOLIDAYS.has(d.toISOString().slice(0, 10)));
  return d.toISOString().slice(0, 10);
}

function parseCsv(text) {
  var lines = text.trim().split('\n').filter(function(l) { return l.trim(); });
  if (lines.length < 2) return [];
  var headers = lines[0].split(',').map(function(s) { return s.trim(); });
  return lines.slice(1).map(function(line) {
    var vals = line.split(',').map(function(s) { return s.trim(); });
    var obj = {};
    headers.forEach(function(h, i) { obj[h] = vals[i] !== undefined ? vals[i] : ''; });
    return obj;
  });
}

function lookupRefCpi(refCpiRows, dateStr) {
  // RefCPI.csv contains pre-computed daily entries published forward in time.
  // Snap to most recent on or before dateStr — but return null if dateStr is
  // beyond the last published entry (value not yet known, e.g. future coupon).
  if (!refCpiRows.length) return null;
  if (dateStr > refCpiRows[refCpiRows.length - 1].date) return null;
  var matches = refCpiRows.filter(function(r) { return r.date <= dateStr; });
  if (!matches.length) return null;
  return matches[matches.length - 1].refCpi;
}

function fmtDate(isoStr) {
  if (!isoStr) return '';
  var parts = isoStr.split('-');
  if (parts.length !== 3) return isoStr;
  return parts[1] + '/' + parts[2] + '/' + parts[0];
}

function recomputeWithRefCpi(dateStr) {
  refCpiDateStr = dateStr;
  var cpi = lookupRefCpi(refCpiRows, dateStr);
  var _rp = dateStr.split('-');
  var refDate = new Date(+_rp[0], +_rp[1] - 1, +_rp[2]); // local midnight, matches _nextCouponOnOrAfter candidates
  allRows.forEach(function(r) {
    r.indexRatio = (r.baseCpi && cpi) ? cpi / r.baseCpi : null;
    r.adjPrice = (r.indexRatio != null && r.price != null) ? r.price * r.indexRatio : null;
    var matDate = r.maturity ? new Date(r.maturity + 'T12:00:00Z') : null;
    if (matDate && matDate > refDate) {
      var nextCpn = _nextCouponOnOrAfter(refDate, matDate);
      if (nextCpn) {
        var y = nextCpn.getFullYear();
        var m = nextCpn.getMonth() + 1 < 10 ? '0' + (nextCpn.getMonth() + 1) : String(nextCpn.getMonth() + 1);
        var d = nextCpn.getDate() < 10 ? '0' + nextCpn.getDate() : String(nextCpn.getDate());
        r.nextCoupon = y + '-' + m + '-' + d;
        r.cpnRefCpi = lookupRefCpi(refCpiRows, r.nextCoupon);
        r.cpnPayment = (r.cpnRefCpi != null && r.baseCpi && r.coupon != null)
          ? (r.coupon / 2) * (r.cpnRefCpi / r.baseCpi) * 1000
          : null;
      } else {
        r.nextCoupon = null;
        r.cpnRefCpi = null; r.cpnPayment = null;
      }
    } else {
      r.nextCoupon = null;
      r.cpnRefCpi = null; r.cpnPayment = null;
    }
  });
  document.getElementById('meta-ref-cpi').textContent = cpi != null ? cpi.toFixed(5) : '—';
  renderTable();
}

function cellDisplay(row, col) {
  return col.fmt(row[col.key]);
}

function getFilteredSorted() {
  var rows = allRows.slice();
  Object.keys(filters).forEach(function(key) {
    var val = filters[key].toLowerCase();
    var col = COLS.find(function(c) { return c.key === key; });
    if (!col) return;
    rows = rows.filter(function(r) {
      return cellDisplay(r, col).toLowerCase().indexOf(val) !== -1;
    });
  });
  var col = COLS.find(function(c) { return c.key === sortCol; });
  if (col) {
    rows.sort(function(a, b) {
      var av = a[sortCol], bv = b[sortCol];
      var cmp;
      if (col.sortType === 'num') {
        cmp = (av != null ? av : -Infinity) - (bv != null ? bv : -Infinity);
      } else {
        cmp = String(av != null ? av : '').localeCompare(String(bv != null ? bv : ''));
      }
      return sortDir === 'asc' ? cmp : -cmp;
    });
  }
  return rows;
}

function showCpnModal(row) {
  function r2(label, val) { return '<tr><td class="cml">' + label + '</td><td class="cmv">' + val + '</td></tr>'; }
  function sep() { return '<tr class="cms"><td colspan="2"></td></tr>'; }

  var ir = (row.cpnRefCpi != null && row.baseCpi) ? row.cpnRefCpi / row.baseCpi : null;
  var semiRate = row.coupon != null ? row.coupon / 2 : null;

  var formulaVars = 'Index Ratio &times; (Coupon Rate / 2) &times; $1,000';
  var formulaNums = (ir != null && semiRate != null)
    ? ir.toFixed(5) + ' &times; ' + (semiRate * 100).toFixed(4) + '% &times; $1,000'
    : '—';

  var html = '<table class="cmt">' +
    r2('CUSIP', row.cusip || '—') +
    r2('Coupon Date', row.nextCoupon ? fmtDate(row.nextCoupon) : '—') +
    sep() +
    r2('Coupon Rate', row.coupon != null ? (row.coupon * 100).toFixed(3) + '%' : '—') +
    r2('Semi-Annual Rate', semiRate != null ? (semiRate * 100).toFixed(4) + '%' : '—') +
    sep() +
    r2('Index Ratio', ir != null ? ir.toFixed(5) : '—') +
    sep() +
    '<tr class="cmf"><td colspan="2">' + formulaVars + '</td></tr>' +
    '<tr class="cmf"><td colspan="2">= ' + formulaNums + '</td></tr>' +
    '<tr class="cmr"><td class="cml">Coupon Payment</td><td class="cmv">' +
      (row.cpnPayment != null ? '$' + row.cpnPayment.toFixed(4) + ' per bond' : '—') +
    '</td></tr>' +
    '</table>';

  document.getElementById('cpn-modal-title').textContent = 'Coupon Calculation';
  document.getElementById('cpn-modal-body').innerHTML = html;
  document.getElementById('cpn-modal').classList.add('open');
}

function buildHeader() {
  var headerRow = document.getElementById('header-row');
  var filterRow = document.getElementById('filter-row');
  headerRow.innerHTML = '';
  filterRow.innerHTML = '';

  COLS.forEach(function(col) {
    var th = document.createElement('th');
    th.textContent = col.label;
    if (col.align === 'left') th.classList.add('left');
    if (col.wrapHeader) th.classList.add('wrap-header');
    if (col.title) th.title = col.title;
    if (sortCol === col.key) th.classList.add(sortDir === 'asc' ? 'sort-asc' : 'sort-desc');
    th.addEventListener('click', function() {
      if (sortCol === col.key) {
        sortDir = sortDir === 'asc' ? 'desc' : 'asc';
      } else {
        sortCol = col.key;
        sortDir = 'asc';
      }
      buildHeader();
      renderTable();
    });
    headerRow.appendChild(th);

    var td = document.createElement('td');
    var inp = document.createElement('input');
    inp.type = 'text';
    inp.size = 1;
    inp.className = 'filter-input';
    inp.placeholder = '\u2026';
    inp.value = filters[col.key] || '';
    if (filters[col.key]) inp.classList.add('active');
    (function(colKey, input) {
      input.addEventListener('input', function() {
        var v = input.value.trim();
        if (v) { filters[colKey] = v; input.classList.add('active'); }
        else { delete filters[colKey]; input.classList.remove('active'); }
        renderTable();
      });
    })(col.key, inp);
    td.appendChild(inp);
    filterRow.appendChild(td);
  });

  // Sync filter row top to actual header height
  var headerHeight = document.querySelector('thead tr:first-child').offsetHeight;
  document.querySelectorAll('thead tr.filter-row td').forEach(function(td) {
    td.style.top = headerHeight + 'px';
  });
}

function renderTable() {
  var rows = getFilteredSorted();
  lastRenderedRows = rows;
  var tbody = document.getElementById('main-tbody');
  var rc = document.getElementById('row-count');

  var html = '';
  rows.forEach(function(r, i) {
    html += '<tr data-idx="' + i + '">';
    COLS.forEach(function(col) {
      var cls = col.align === 'right' ? 'right' : '';
      if (col.key === 'cpnPayment' && r.cpnPayment != null) cls += (cls ? ' ' : '') + 'cpn-clickable';
      html += '<td' + (cls ? ' class="' + cls + '"' : '') + '>' + cellDisplay(r, col) + '</td>';
    });
    html += '</tr>';
  });
  tbody.innerHTML = html;
  rc.textContent = rows.length + ' of ' + allRows.length + ' TIPS';
  rc.style.display = 'block';
}

async function loadData() {
  var statusEl = document.getElementById('status');
  try {
    var responses = await Promise.all([
      fetch(BASE_URL + '/YieldsFromFedInvestPrices.csv', { cache: 'no-cache' }),
      fetch(TIPS_URL + '/RefCPI.csv', { cache: 'no-cache' }),
      fetch(TIPS_URL + '/TipsRef.csv', { cache: 'no-cache' }),
    ]);
    if (!responses[0].ok) throw new Error('YieldsFromFedInvestPrices.csv: HTTP ' + responses[0].status);
    if (!responses[1].ok) throw new Error('RefCPI.csv: HTTP ' + responses[1].status);
    if (!responses[2].ok) throw new Error('TipsRef.csv: HTTP ' + responses[2].status);

    var yieldsText = await responses[0].text();
    var yieldsLines = yieldsText.trim().split('\n');
    priceDateStr = yieldsLines[0].trim();
    settlementDateStr = nextTreasuryBusinessDay(priceDateStr);

    var yieldsRows = parseCsv(yieldsLines.slice(1).join('\n'))
      .filter(function(r) { return r.type === 'TIPS'; })
      .map(function(r) {
        return {
          cusip:    r.cusip,
          maturity: r.maturity,
          coupon:   parseFloat(r.coupon),
          price:    parseFloat(r.price) || null,
          yield:    parseFloat(r.yield) || null,
        };
      });

    refCpiRows = parseCsv(await responses[1].text()).map(function(r) {
      return { date: r.date, refCpi: parseFloat(r.refCpi) };
    });

    var tipsRefRows = parseCsv(await responses[2].text()).map(function(r) {
      return { cusip: r.cusip, datedDate: r.datedDate, baseCpi: parseFloat(r.baseCpi) };
    });
    var tipsRefMap = {};
    tipsRefRows.forEach(function(r) { tipsRefMap[r.cusip] = r; });

    var settlDate = new Date(settlementDateStr + 'T12:00:00Z');

    allRows = yieldsRows.map(function(r) {
      var ref = tipsRefMap[r.cusip];
      var baseCpi = ref ? ref.baseCpi : null;
      var matDate = r.maturity ? new Date(r.maturity + 'T12:00:00Z') : null;
      var term = (matDate && matDate > settlDate) ? (matDate - settlDate) / (365.25 * 86400000) : null;
      var macDur = (matDate && r.coupon != null && r.yield != null && !isNaN(r.yield))
        ? calculateDuration(settlDate, matDate, r.coupon, r.yield) : null;
      var modDur = (macDur != null) ? macDur / (1 + r.yield / 2) : null;
      return {
        cusip:       r.cusip,
        maturity:    r.maturity,
        coupon:      r.coupon,
        datedDate:   ref ? ref.datedDate : '',
        baseCpi:     baseCpi,
        price:       r.price,
        indexRatio:  null,
        adjPrice:    null,
        yield:       r.yield,
        term:        term,
        macDuration: macDur,
        modDuration: modDur,
        nextCoupon:  null,
        cpnPayment:  null,
      };
    });

    document.getElementById('meta-price-date').textContent = fmtDate(priceDateStr);
    document.getElementById('meta-sett-date').textContent = fmtDate(settlementDateStr);
    document.getElementById('header-meta').style.display = 'flex';
    statusEl.textContent = '';
    document.getElementById('export-btn').disabled = false;

    var dateInput = document.getElementById('ref-cpi-date-input');
    if (refCpiRows.length) {
      dateInput.min = refCpiRows[0].date;
      dateInput.max = refCpiRows[refCpiRows.length - 1].date;
    }
    dateInput.value = settlementDateStr;
    dateInput.addEventListener('change', function() {
      if (this.value) recomputeWithRefCpi(this.value);
    });

    buildHeader();
    recomputeWithRefCpi(settlementDateStr);
  } catch (err) {
    statusEl.textContent = err.message;
    statusEl.classList.add('error');
  }
}

document.getElementById('export-btn').addEventListener('click', function() {
  var rows = getFilteredSorted();
  var headerLine = COLS.map(function(c) { return c.label; }).join(',');
  var dataLines = rows.map(function(r) {
    return COLS.map(function(col) {
      var v = cellDisplay(r, col);
      return v.indexOf(',') !== -1 ? '"' + v + '"' : v;
    }).join(',');
  });
  var csv = [headerLine].concat(dataLines).join('\n');
  var blob = new Blob([csv], { type: 'text/csv' });
  var a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'tips-reference' + (settlementDateStr ? '-' + settlementDateStr : '') + '.csv';
  a.click();
  URL.revokeObjectURL(a.href);
});

document.getElementById('main-tbody').addEventListener('click', function(e) {
  var td = e.target.closest('td.cpn-clickable');
  if (!td) return;
  var idx = parseInt(td.closest('tr').getAttribute('data-idx'), 10);
  if (!isNaN(idx) && lastRenderedRows[idx]) showCpnModal(lastRenderedRows[idx]);
});
document.getElementById('cpn-modal-close').addEventListener('click', function() {
  document.getElementById('cpn-modal').classList.remove('open');
});
document.getElementById('cpn-modal-overlay').addEventListener('click', function() {
  document.getElementById('cpn-modal').classList.remove('open');
});
document.addEventListener('keydown', function(e) {
  if (e.key === 'Escape') document.getElementById('cpn-modal').classList.remove('open');
});

loadData();
</script>
<script>if ('serviceWorker' in navigator) navigator.serviceWorker.register('../sw.js');</script>
</body>
